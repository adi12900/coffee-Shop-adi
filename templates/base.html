<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Coffee Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5ede3; color: #2c1a0e; min-height: 100vh; }

    nav {
      background: #3b1a08;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    nav .logo { color: #f5c842; font-size: 1.3rem; font-weight: bold; margin-right: auto; }
    nav a { color: #f5e6d3; text-decoration: none; padding: 0.4rem 0.9rem; border-radius: 6px; transition: background 0.2s; }
    nav a:hover, nav a.active { background: #c8860a; color: white; }

    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }

    h2 { font-size: 1.8rem; color: #3b1a08; margin-bottom: 1.5rem; border-left: 4px solid #c8860a; padding-left: 0.8rem; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 10px; padding: 1.2rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-top: 4px solid #c8860a; }
    .stat-card .value { font-size: 2rem; font-weight: bold; color: #c8860a; }
    .stat-card .label { color: #7a5c44; font-size: 0.9rem; margin-top: 0.2rem; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #3b1a08; color: #f5c842; padding: 0.9rem 1rem; text-align: left; }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid #f0e0d0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf5ee; }

    .card { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .card h3 { color: #3b1a08; margin-bottom: 1rem; font-size: 1.1rem; }

    .form-row { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.85rem; color: #7a5c44; font-weight: 600; }
    input, select { padding: 0.5rem 0.8rem; border: 1px solid #d4b896; border-radius: 6px; font-size: 0.95rem; background: #fffaf6; color: #2c1a0e; }
    input:focus, select:focus { outline: none; border-color: #c8860a; }

    .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: opacity 0.2s; }
    .btn-primary { background: #c8860a; color: white; }
    .btn-danger  { background: #c0392b; color: white; }
    .btn-sm      { padding: 0.3rem 0.7rem; font-size: 0.82rem; }
    .btn:hover   { opacity: 0.85; }

    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge-hot    { background: #ffe0cc; color: #c0392b; }
    .badge-cold   { background: #cce5ff; color: #1565c0; }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-preparing { background: #cce5ff; color: #1565c0; }
    .badge-ready     { background: #d4edda; color: #155724; }
    .badge-delivered { background: #e2e3e5; color: #383d41; }

    .flash { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1.2rem; font-weight: 500; }
    .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash-info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

    .empty { text-align: center; padding: 2rem; color: #7a5c44; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">☕ Coffee Management</span>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
    <a href="/menu" {% if request.path == '/menu' %}class="active"{% endif %}>Menu</a>
    <a href="/orders" {% if request.path == '/orders' %}class="active"{% endif %}>Orders</a>
    <a href="/inventory" {% if request.path == '/inventory' %}class="active"{% endif %}>Inventory</a>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
